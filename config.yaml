# config.yaml — single source of truth for seeds, paths, composition, hyperparameters.
# Rules.md §6.5: keep config out of code. Everything stochastic reads its seed from here.

seed: 20260629   # global seed; logged in every stochastic step

paths:
  data_raw: data/raw
  data_pools: data/pools
  train: data/raw/train.jsonl
  val: data/raw/val.jsonl
  test: data/raw/test.jsonl
  hard_test: data/raw/hard_test.jsonl
  reports: reports
  adapter_out: artifacts/lora_adapter

# ---- Label schema (rules.md §2 / plan.md §5). Order is fixed for reproducible label ids. ----
label_types:
  - NAME
  - ADDRESS
  - DATE
  - SSN
  - MRN
  - NPI
  - PLAN_ID
  - ACCOUNT
  - LICENSE
  - DEVICE_ID
  - VEHICLE_ID
  - PHONE
  - EMAIL
  - URL
  - IP
  - AGE90
  - OTHER_ID

# ---- Synthetic data composition (plan.md §7) ----
data:
  # Day-2 v1 quick set; Day-6 v2 scales these up.
  v1_total: 2000
  v2_total: 16000
  positive_fraction: 0.5
  min_positives_per_category: 300   # for common types (v2)
  hard_test_size: 1500              # the set that decides the verdict
  record_shapes: [A, B, C]          # generic API req / intake form / log line
  # Per-split entity & template pools are generated disjointly (rules.md §3).
  split_fractions:                  # applied at the entity/template level, not row level
    train: 0.8
    val: 0.1
    test: 0.1

# ---- Base model ----
model:
  base: microsoft/deberta-v3-base
  max_length: 256
  decoder_alt: null    # stretch only; never the baseline
  fewshot: Qwen/Qwen2.5-1.5B-Instruct   # small instruct decoder for the §8.3 few-shot baseline

# ---- LoRA (plan.md §9 / rules.md §4). modules_to_save is MANDATORY. ----
lora:
  task_type: TOKEN_CLS
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: all-linear
  modules_to_save: [classifier]   # <-- without this the head never learns

# Sweep grid (Day 8)
sweep:
  r: [8, 16, 32]
  alpha_rule: ["r", "2r"]          # alpha = r or 2r
  learning_rate: [1.0e-4, 2.0e-4]
  epochs: [2, 3]

train:
  learning_rate: 2.0e-4
  epochs: 3
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  weight_decay: 0.01
  warmup_ratio: 0.06
  logging_steps: 25
  eval_strategy: epoch
  save_strategy: epoch
  # bf16, NOT fp16: DeBERTa-v3 overflows in fp16 (NaN loss is a well-known failure mode).
  # The RTX 5070 Ti (Blackwell) supports bf16 natively.
  bf16: true
  fp16: false

# ---- Evaluation (plan.md §10 / rules.md §5) ----
eval:
  target_recall: 0.97        # operating point for matched-recall comparison
  span_match: overlap        # lead metric; strict-exact also reported
  latency_target_ms: 50      # per-record on GPU; missing it is a finding
  latency_warmup: 5
  latency_runs: 100

# ---- Regex baseline patterns (plan.md §8, exact — not a strawman) ----
regex_patterns:
  SSN: '\b\d{3}-\d{2}-\d{4}\b'
  EMAIL: '\b[\w.+-]+@[\w-]+\.[\w.-]+\b'
  PHONE: '\b(?:\+?1[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}\b'
  IP: '\b(?:\d{1,3}\.){3}\d{1,3}\b'
  DATE: '\b\d{1,2}[/-]\d{1,2}[/-]\d{2,4}\b'
  MRN: '\bMRN[-:\s]?\w{5,10}\b'
